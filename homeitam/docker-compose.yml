version: '3.8'

services:
  homeitam:
    image: ghcr.io/sam-steel/homeitam:latest
    container_name: homeitam
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=changeme123 # Change this!
    restart: unless-stopped
